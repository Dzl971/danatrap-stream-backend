services:
  - type: web
    name: danatrap-stream-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn serveur:app --host 0.0.0.0 --port ${PORT}
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CLE_SECRETE_JWT
        generateValue: true
      - key: TOKEN_BASE64
        sync: false
